<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <h2>Register</h2>

    <form action="/register" method="POST">

        <input type="text"
        name="username"
        placeholder="Enter Username"
        required>

        <input type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">

            Register

        </button>

    </form>

    <br>

    <a href="/login">

        Already have account? Login

    </a>

</div>

</body>

</html>
