<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <h2>Login</h2>

    <form action="/login" method="POST">

        <input type="text"
        name="username"
        placeholder="Enter Username"
        required>

        <input type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <p style="color:red;">

        {{ error }}

    </p>

</div>

</body>

</html>
