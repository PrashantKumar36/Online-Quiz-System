<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Online Quiz System</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="navbar">


        <h2>Quiz Website</h2>

        <div>

            <a href="/login">Login</a>

            <a href="/register">Register</a>

        </div>

    </div>

    <div class="hero">

        <h1>Welcome to Online Quiz Platform</h1>

        <p>Practice quizzes and improve your knowledge</p>
       


    </div>

    <div class="container">

        <h2>Available Quizzes</h2>

        {% for quiz in quizzes %}

        <div class="card">

            <h3>{{ quiz.category }}</h3>

            <a href="/quiz/{{ quiz.id }}">

                <button>Start Quiz</button>

            </a>

        </div>

        {% endfor %}

    </div>

</body>

</html>
