<!DOCTYPE html>
<html>

<head>

    <title>Result</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="result-box">

        <h1>Quiz Result</h1>

        <h2>

            Your Score:

            {{ score }} / {{ total }}

        </h2>

    </div>

    <h2>Correct Answers</h2>

    {% for q in questions %}

    <div class="card">

        <h3>{{ q.question }}</h3>

        <p>

            Correct Answer:

            {{ q.answer }}

        </p>

    </div>

    {% endfor %}

    <a href="/dashboard">

        <button>

            Back to Dashboard

        </button>

    </a>

</div>

</body>

</html>
